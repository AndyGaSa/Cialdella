name: Deploy Pages (self-hosted Linux)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html styles.css app.js CNAME _site/
          cp -r assets _site/

      - uses: actions/configure-pages@v5
      
      - name: Verify tar
        shell: bash
        run: tar --version

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
